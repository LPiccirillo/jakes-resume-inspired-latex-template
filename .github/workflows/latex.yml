name: Compile LaTeX Resume

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v4
        with:
          root_file: resume-LaTeX-template.tex
          latexmk_use_xelatex: false
          args: -pdf -interaction=nonstopmode -shell-escape

      - name: Rename PDF
        run: cp resume-LaTeX-template.pdf resume.pdf

      - name: Commit updated PDF
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "Update compiled resume [skip ci]"
          file_pattern: resume.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v5
        with:
          name: compiled-resume
          path: resume.pdf
